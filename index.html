<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto de Venta - Abarrotes</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <nav class="bg-blue-600 text-white shadow-md mb-6">
        <div class="max-w-6xl mx-auto px-4 flex justify-between items-center h-16">
            <h1 class="text-xl font-bold tracking-wide">📦 Sistema POS - Abarrotes</h1>
            <div class="flex space-x-2">
                <button onclick="cambiarPestaña('pestaña-mostrador')" id="btn-mostrador" class="px-4 py-2 rounded-md font-semibold bg-blue-700 text-white shadow cursor-pointer hover:bg-blue-500 transition-all duration-200">
                    🛒 Mostrador (F1)
                </button>
                <button onclick="cambiarPestaña('pestaña-inventario')" id="btn-inventario" class="px-4 py-2 rounded-md font-semibold cursor-pointer hover:bg-blue-500 transition-all duration-200">
                    🔧 Inventario (F2)
                </button>
                <button onclick="obtenerCorteCaja()" class="px-4 py-2 bg-green-700 hover:bg-green-800 rounded-md font-semibold cursor-pointer transition-all duration-200">
                    💰 Corte de Caja
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 pb-12">

        <section id="pestaña-mostrador" class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="md:col-span-3 bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <label class="block text-sm font-semibold text-gray-700 mb-2">Buscar por Nombre o Código de Barras</label>
                <div class="flex gap-2 mb-6">
                    <input type="text" id="codigoBuscar" placeholder="Ej. Leche Lala o 123456789" class="w-full px-4 py-2 border rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg">
                    <button onclick="buscarProducto()" class="bg-blue-600 text-white px-6 py-2 rounded-md font-semibold hover:bg-blue-700 cursor-pointer transition">Buscar</button>
                </div>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider border-b">
                                <th class="p-3">Producto</th>
                                <th class="p-3">Precio</th>
                                <th class="p-3 text-center">Cantidad</th>
                                <th class="p-3">Total</th>
                            </tr>
                        </thead>
                        <tbody id="tablaCarrito" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit flex flex-col justify-between">
                <div>
                    <h3 class="text-gray-500 font-bold uppercase text-xs tracking-wider mb-4">Resumen de Venta</h3>
                    <div class="flex justify-between items-center border-t border-b py-4 my-4">
                        <span class="text-lg font-bold text-gray-700">TOTAL:</span>
                        <span id="totalVenta" class="text-3xl font-black text-green-600">$0.00</span>
                    </div>
                </div>
                <button onclick="cobrarVenta()" class="w-full bg-green-600 text-white py-3 rounded-lg font-bold text-lg hover:bg-green-700 cursor-pointer shadow-md transition">
                    💵 Cobrar Venta
                </button>
            </div>
        </section>

        <section id="pestaña-inventario" class="hidden grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="bg-white p-6 rounded-lg shadow-sm border border-gray-200 h-fit">
                <h2 id="tituloFormInventario" class="text-lg font-bold text-gray-800 mb-4 border-b pb-2">➕ Registrar Nuevo Producto</h2>
                <form id="formProducto" onsubmit="registrarProducto(event)" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Código de Barras</label>
                        <input type="text" id="regCodigo" oninput="comprobarCodigoManual()" required class="w-full px-3 py-2 border rounded-md font-mono">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nombre del Producto</label>
                        <input type="text" id="regNombre" required class="w-full px-3 py-2 border rounded-md">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Precio de Venta</label>
                            <input type="number" id="regPrecio" step="0.01" required class="w-full px-3 py-2 border rounded-md">
                        </div>
                        <div>
                            <label class="block text-sm font-medium text-gray-600 mb-1">Existencia Real</label>
                            <input type="number" id="regExistencia" required class="w-full px-3 py-2 border rounded-md">
                        </div>
                    </div>
                    <button type="submit" id="btnGuardarInventario" class="w-full bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 cursor-pointer transition">
                        Guardar en Base de Datos
                    </button>
                    <button type="button" id="btnCancelarEdicion" onclick="limpiarFormularioInventario()" class="hidden w-full bg-gray-200 text-gray-700 mt-2 py-2 rounded-md font-semibold hover:bg-gray-300 transition">
                        Cancelar Edición
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-lg shadow-sm border border-gray-200">
                <div class="sm:flex justify-between items-center mb-4 border-b pb-2">
                    <h2 class="text-lg font-bold text-gray-800">📋 Filtro de Almacén</h2>
                    <input type="text" id="buscadorAlmacen" oninput="filtrarInventarioLocal(this.value)" placeholder="🔍 Filtrar por nombre..." class="px-3 py-1.5 border rounded-md text-sm w-full sm:w-64">
                </div>
                <div class="overflow-x-auto max-h-[450px]">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="text-gray-600 uppercase text-xs tracking-wider border-b">
                                <th class="p-3">Código</th>
                                <th class="p-3">Nombre</th>
                                <th class="p-3">Precio</th>
                                <th class="p-3 text-center">Stock</th>
                                <th class="p-3 text-center">Acción</th>
                            </tr>
                        </thead>
                        <tbody id="tablaInventarioCompleto" class="divide-y divide-gray-100 text-sm"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>

    <script>
        const API_URL = "http://127.0.0.1:8000";
        let carrito = [];
        let productosCache = []; 

        function cambiarPestaña(pestañaId) {
            document.getElementById('pestaña-mostrador').classList.add('hidden');
            document.getElementById('pestaña-inventario').classList.add('hidden');
            document.getElementById('btn-mostrador').classList.remove('bg-blue-700', 'shadow');
            document.getElementById('btn-inventario').classList.remove('bg-blue-700', 'shadow');

            document.getElementById(pestañaId).classList.remove('hidden');
            if (pestañaId === 'pestaña-mostrador') {
                document.getElementById('btn-mostrador').classList.add('bg-blue-700', 'shadow');
                document.getElementById('codigoBuscar').focus();
            } else {
                document.getElementById('btn-inventario').classList.add('bg-blue-700', 'shadow');
                cargarInventarioCompleto();
            }
        }

        window.addEventListener('keydown', function(e) {
            if (e.key === 'F1') { e.preventDefault(); cambiarPestaña('pestaña-mostrador'); }
            if (e.key === 'F2') { e.preventDefault(); cambiarPestaña('pestaña-inventario'); }
        });

        async function buscarProducto() {
            const criterio = document.getElementById('codigoBuscar').value.trim();
            if (!criterio) return;

            try {
                const respuesta = await fetch(`${API_URL}/productos/buscar?q=${encodeURIComponent(criterio)}`);
                if (respuesta.status === 404) {
                    alert("❌ Producto no encontrado.");
                    return;
                }
                const producto = await respuesta.json();

                if (producto.existencia <= 0) {
                    alert(`⚠️ Sin existencias para: ${producto.nombre}`);
                    return;
                }

                agregarAlCarrito(producto);
                document.getElementById('codigoBuscar').value = '';
            } catch (error) { alert("❌ Error de conexión con el backend."); }
        }

        function agregarAlCarrito(producto) {
            const codigo = producto.codigo_barras;
            const index = carrito.findIndex(item => item.codigo_barras === codigo);

            if (index !== -1) {
                if (carrito[index].cantidad < producto.existencia) {
                    carrito[index].cantidad++;
                } else { alert(`Máximo de stock alcanzado.`); }
            } else {
                carrito.push({ ...producto, cantidad: 1 });
            }
            actualizarTablaHTML();
        }

        function cambiarCantidad(codigo, cambio) {
            const index = carrito.findIndex(item => item.codigo_barras === codigo);
            if (index === -1) return;

            carrito[index].cantidad += cambio;
            if (carrito[index].cantidad <= 0) {
                carrito.splice(index, 1);
            } else if (carrito[index].cantidad > carrito[index].existencia) {
                alert("No hay suficiente stock.");
                carrito[index].cantidad = carrito[index].existencia;
            }
            actualizarTablaHTML();
        }

        function actualizarTablaHTML() {
            const tbody = document.getElementById('tablaCarrito');
            const totalSpan = document.getElementById('totalVenta');
            tbody.innerHTML = '';
            let totalGeneral = 0;

            carrito.forEach(item => {
                const precioReal = item.precio_venta || 0;
                const subtotal = precioReal * item.cantidad;
                totalGeneral += subtotal;

                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-100">
                        <td class="p-3 font-medium text-gray-800">${item.nombre}</td>
                        <td class="p-3">$${precioReal.toFixed(2)}</td>
                        <td class="p-3 text-center flex items-center justify-center gap-2">
                            <button onclick="cambiarCantidad('${item.codigo_barras}', -1)" class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded hover:bg-gray-300 font-bold cursor-pointer">-</button>
                            <span class="w-8 font-bold">${item.cantidad}</span>
                            <button onclick="cambiarCantidad('${item.codigo_barras}', 1)" class="bg-gray-200 text-gray-700 px-2 py-0.5 rounded hover:bg-gray-300 font-bold cursor-pointer">+</button>
                        </td>
                        <td class="p-3 font-semibold text-gray-700">$${subtotal.toFixed(2)}</td>
                    </tr>
                `;
            });
            totalSpan.innerText = `$${totalGeneral.toFixed(2)}`;
        }

        // 💵 COBRAR VENTA CON VENTANA EMERGENTE REDIMENSIONADA
        async function cobrarVenta() {
            if (carrito.length === 0) return alert("El carrito está vacío.");
            
            let totalGeneral = 0;
            let resumenProductos = [];
            let lineasProductosHTML = "";

            carrito.forEach(item => {
                const precioReal = item.precio_venta || 0;
                const subtotal = precioReal * item.cantidad;
                totalGeneral += subtotal;
                resumenProductos.push(`${item.cantidad}x ${item.nombre}`);

                lineasProductosHTML += `
                    <tr>
                        <td style="padding: 3px 0;">${item.cantidad} x ${item.nombre}</td>
                        <td style="text-align: right; padding: 3px 0;">$${subtotal.toFixed(2)}</td>
                    </tr>
                `;
            });

            const fechaActual = new Date().toLocaleString();

            try {
                for (const item of carrito) {
                    await fetch(`${API_URL}/productos/${encodeURIComponent(item.codigo_barras)}/inventario`, {
                        method: 'PATCH',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ cantidad: item.cantidad })
                    });
                }

                await fetch(`${API_URL}/ventas/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        total: totalGeneral,
                        productos_vendidos: resumenProductos.join(", ")
                    })
                });

                // Ventana temporal optimizada para formato ticket de 80mm
                const ventanaImpresion = window.open('', '_blank', 'width=300,height=600');
                
                ventanaImpresion.document.write(`
                    <html>
                    <head>
                        <title>Imprimir Ticket</title>
                        <style>
                            @page { size: 80mm auto; margin: 0; }
                            body { 
                                font-family: 'Courier New', Courier, monospace; 
                                font-size: 12px; 
                                color: black; 
                                padding: 10px; 
                                width: 240px;
                                margin: 0;
                            }
                            .centro { text-align: center; }
                            .derecha { text-align: right; }
                            .negrita { font-weight: bold; }
                            .linea { border-bottom: 1px dashed black; margin: 6px 0; }
                        </style>
                    </head>
                    <body>
                        <div class="centro negrita" style="font-size: 14px;">🏪 TIENDA Y ABARROTES FAMILY</div>
                        <div class="centro" style="font-size: 11px; margin-bottom: 5px;">¡Gracias por su preferencia!</div>
                        <div class="linea"></div>
                        <div>Fecha: ${fechaActual}</div>
                        <div class="linea"></div>
                        <table style="width: 100%; border-collapse: collapse;">
                            <thead>
                                <tr style="border-bottom: 1px dashed black;">
                                    <th style="text-align: left; padding-bottom: 4px;">DESCRIPCIÓN</th>
                                    <th style="text-align: right; padding-bottom: 4px;">TOTAL</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${lineasProductosHTML}
                            </tbody>
                        </table>
                        <div class="linea"></div>
                        <div class="derecha negrita" style="font-size: 14px;">
                            TOTAL: $${totalGeneral.toFixed(2)}
                        </div>
                        <div class="centro" style="margin-top: 25px; font-size: 10px;">*** NO REEMBOLSABLE ***</div>
                        <script>
                            window.onload = function() {
                                window.print();
                                window.close();
                            };
                        <\/script>
                    </body>
                    </html>
                `);
                
                ventanaImpresion.document.close();

                carrito = [];
                actualizarTablaHTML();

            } catch (error) { 
                alert("❌ Error al procesar la venta en el servidor."); 
            }
        }

        async function cargarInventarioCompleto() {
            try {
                const respuesta = await fetch(`${API_URL}/productos/`);
                productosCache = await respuesta.json();
                renderizarTablaInventario(productosCache);
            } catch (error) { console.error(error); }
        }

        function renderizarTablaInventario(lista) {
            const tbody = document.getElementById('tablaInventarioCompleto');
            tbody.innerHTML = '';
            lista.forEach(p => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-50 border-b border-gray-100">
                        <td class="p-3 font-mono text-gray-600">${p.codigo_barras}</td>
                        <td class="p-3 font-medium text-gray-800">${p.nombre}</td>
                        <td class="p-3 text-gray-700">$${p.precio_venta.toFixed(2)}</td>
                        <td class="p-3 text-center font-bold ${p.existencia <= 3 ? 'text-red-500 bg-red-50' : 'text-gray-700'}">${p.existencia} pza</td>
                        <td class="p-3 text-center">
                            <button type="button" onclick="autorellenarFormulario('${p.codigo_barras}')" class="bg-blue-50 text-blue-600 px-3 py-1 rounded-md text-xs font-bold hover:bg-blue-600 hover:text-white cursor-pointer transition">
                                ✏️ Editar
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        function filtrarInventarioLocal(texto) {
            const t = texto.toLowerCase().trim();
            const filtrados = productosCache.filter(p => 
                p.nombre.toLowerCase().includes(t) || p.codigo_barras.includes(t)
            );
            renderizarTablaInventario(filtrados);
        }

        function autorellenarFormulario(codigo) {
            const p = productosCache.find(item => item.codigo_barras === codigo);
            if (!p) return;

            document.getElementById('regCodigo').value = p.codigo_barras;
            document.getElementById('regNombre').value = p.nombre;
            document.getElementById('regPrecio').value = p.precio_venta;
            document.getElementById('regExistencia').value = p.existencia;

            document.getElementById('tituloFormInventario').innerText = "🔄 Editar Producto Existente";
            document.getElementById('btnGuardarInventario').className = "w-full bg-amber-500 text-white py-2 rounded-md font-semibold hover:bg-amber-600 cursor-pointer transition";
            document.getElementById('btnGuardarInventario').innerText = "Actualizar Valores";
            document.getElementById('btnCancelarEdicion').classList.remove('hidden');
            document.getElementById('regExistencia').focus();
        }

        function comprobarCodigoManual() {
            const codigo = document.getElementById('regCodigo').value.trim();
            const p = productosCache.find(item => item.codigo_barras === codigo);
            if (p) autorellenarFormulario(codigo);
        }

        function limpiarFormularioInventario() {
            document.getElementById('formProducto').reset();
            document.getElementById('tituloFormInventario').innerText = "➕ Registrar Nuevo Producto";
            document.getElementById('btnGuardarInventario').className = "w-full bg-blue-600 text-white py-2 rounded-md font-semibold hover:bg-blue-700 cursor-pointer transition";
            document.getElementById('btnGuardarInventario').innerText = "Guardar en Base de Datos";
            document.getElementById('btnCancelarEdicion').classList.add('hidden');
        }

        async function registrarProducto(event) {
            event.preventDefault();
            const codigo = document.getElementById('regCodigo').value.trim();
            const datos = {
                codigo_barras: codigo,
                nombre: document.getElementById('regNombre').value.trim(),
                precio_venta: parseFloat(document.getElementById('regPrecio').value) || 0.0,
                existencia: parseInt(document.getElementById('regExistencia').value) || 0
            };

            const esEdicion = document.getElementById('btnGuardarInventario').innerText.includes("Actualizar");

            try {
                let url = esEdicion ? `${API_URL}/productos/${encodeURIComponent(codigo)}` : `${API_URL}/productos/`;
                let metodo = esEdicion ? 'PUT' : 'POST';

                let respuesta = await fetch(url, {
                    method: metodo,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(datos)
                });

                if (respuesta.ok || respuesta.status === 201) {
                    alert("✅ Guardado correctamente.");
                    limpiarFormularioInventario();
                    cargarInventarioCompleto();
                } else { alert("❌ Detalle al guardar."); }
            } catch (error) { alert("❌ Error de comunicación."); }
        }

        async function obtenerCorteCaja() {
            try {
                const respuesta = await fetch(`${API_URL}/cierre-caja/`);
                const corte = await respuesta.json();
                alert(`📋 CORTE DE CAJA DEL DÍA\n\n📅 Fecha: ${corte.fecha}\n🛒 Número de Ventas: ${corte.numero_ventas}\n💰 Total en Caja: $${corte.total_generado.toFixed(2)}`);
            } catch (error) { alert("❌ Error al conectar con el cierre de caja."); }
        }

        document.getElementById('codigoBuscar').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') buscarProducto();
        });
        document.getElementById('codigoBuscar').focus();
    </script>
</body>
</html>
